<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St. James — Hero Cutout Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --wine: #9c2426;
      --gold: #c9973a;
      --cream: #faf6f0;
      --charcoal: #1e1212;
    }

    body { font-family: 'Inter', sans-serif; background: #111; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--charcoal);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .nav-brand span { display: block; font-size: 0.6rem; font-weight: 400; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; text-transform: uppercase; }
    .nav-cta { background: var(--wine); color: white; padding: 9px 20px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-decoration: none; }

    /* ─── HERO ─────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      background: var(--cream);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 90px;
    }

    /*
     * OVAL PLATFORM — mimics the Bahama Buck's teal shape.
     * A soft wine-tinted ellipse behind the centered text
     * gives depth and grounds the floating items.
     */
    .hero::before {
      content: '';
      position: absolute;
      bottom: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 55%;
      background: radial-gradient(ellipse 100% 100% at 50% 80%,
        rgba(156,36,38,0.07) 0%,
        rgba(201,151,58,0.04) 40%,
        transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* ─── FLOATING ITEMS ───────────────────────────── */

    @keyframes dropIn {
      0%   { opacity: 0; transform: translateY(calc(-220px + var(--y-offset, 0px))) rotate(var(--rot)) scale(0.55); }
      60%  { opacity: 1; transform: translateY(12px) rotate(var(--rot)) scale(1.03); }
      100% { opacity: 1; transform: translateY(0) rotate(var(--rot)) scale(1); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0)      rotate(var(--rot)); }
      50%       { transform: translateY(var(--bob-height, -16px)) rotate(var(--rot)); }
    }

    .floaters {
      position: absolute;
      inset: 0;
      top: 64px;
      pointer-events: none;
    }

    /*
     * KEY DIFFERENCE FROM OLD DESIGN:
     * — No border-radius, no overflow:hidden, no box-shadow on the container
     * — filter: drop-shadow() on the <img> — follows the actual pixel shape
     *   so when you swap in background-removed PNGs the shadow hugs the object
     * — object-fit: contain (not cover) so PNGs show their full shape
     */
    .item {
      position: absolute;
      opacity: 0;
      animation:
        dropIn 0.95s cubic-bezier(0.22,1,0.36,1) var(--delay, 0s) forwards,
        bob var(--bob, 4s) ease-in-out var(--bob-start, 1s) infinite;
    }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 12px;
      filter: drop-shadow(0 14px 32px rgba(30,18,18,0.22));
    }

    /* Cutout PNGs — no card shape, shadow traces the object edge */
    .item.cutout {
      background: transparent;
    }
    .item.cutout img {
      object-fit: contain;
      border-radius: 0;
      filter: drop-shadow(0 18px 40px rgba(30,18,18,0.30));
    }

    /* ─── ITEM POSITIONS ───────────────────────────────
     *
     * Layout strategy mirrors Bahama Buck's:
     *   Far-left  → large item bleeding off screen
     *   Left      → medium items at upper/mid
     *   Center    → largest/hero item + text below
     *   Right     → medium items at upper/mid
     *   Far-right → large item bleeding off screen
     *   Scattered → small accent items between everything
     *
     * Sizes: large 260-320px, medium 160-200px, small 100-130px
     * All use --rot for consistent rotate in bob animation.
    */

    /* Far-left bleed — large wine tasting scene */
    .i1 {
      width: 280px; height: 240px;
      top: 6%; left: -40px;
      --rot: -8deg; --delay: 0.1s; --bob: 4.4s; --bob-start: 1.1s; --bob-height: -14px;
    }

    /* Left-upper — paint & sip, tilted */
    .i2 {
      width: 170px; height: 200px;
      top: 5%; left: 18%;
      --rot: 5deg; --delay: 0.3s; --bob: 3.9s; --bob-start: 1.3s; --bob-height: -18px;
    }

    /* Left-lower accent — craft beer, smaller */
    .i3 {
      width: 130px; height: 145px;
      top: 34%; left: 8%;
      --rot: 11deg; --delay: 0.5s; --bob: 5.1s; --bob-start: 1.5s; --bob-height: -10px;
    }

    /* Center-left — signature drinks, tall */
    .i4 {
      width: 190px; height: 230px;
      top: 2%; left: 31%;
      --rot: -4deg; --delay: 0.7s; --bob: 4.7s; --bob-start: 1.7s; --bob-height: -20px;
    }

    /* CENTER HERO ITEM — largest, most prominent (food/bistro) */
    .i5 {
      width: 310px; height: 260px;
      top: 0%; left: 50%; transform: translateX(-50%) rotate(-2deg);
      --rot: -2deg; --delay: 0.9s; --bob: 5.4s; --bob-start: 1.9s; --bob-height: -12px;
      /* override the standard animation to account for translateX centering */
      animation:
        dropInCenter 0.95s cubic-bezier(0.22,1,0.36,1) 0.9s forwards,
        bobCenter 5.4s ease-in-out 1.9s infinite;
    }

    @keyframes dropInCenter {
      0%   { opacity: 0; transform: translateX(-50%) translateY(-220px) rotate(-2deg) scale(0.55); }
      60%  { opacity: 1; transform: translateX(-50%) translateY(12px)   rotate(-2deg) scale(1.03); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0)       rotate(-2deg) scale(1); }
    }
    @keyframes bobCenter {
      0%, 100% { transform: translateX(-50%) translateY(0)      rotate(-2deg); }
      50%       { transform: translateX(-50%) translateY(-12px)  rotate(-2deg); }
    }

    /* Center-right — dining scene */
    .i6 {
      width: 195px; height: 225px;
      top: 3%; right: 29%;
      --rot: 5deg; --delay: 1.1s; --bob: 4.2s; --bob-start: 2.1s; --bob-height: -20px;
    }

    /* Right accent — wine bottle/glass, small-medium */
    .i7 {
      width: 135px; height: 155px;
      top: 30%; right: 18%;
      --rot: -9deg; --delay: 1.3s; --bob: 3.7s; --bob-start: 2.3s; --bob-height: -14px;
    }

    /* Right-mid — ABH shot, medium */
    .i8 {
      width: 185px; height: 200px;
      top: 6%; right: 12%;
      --rot: 7deg; --delay: 1.5s; --bob: 4.9s; --bob-start: 2.5s; --bob-height: -18px;
    }

    /* Far-right bleed — exterior/large shot */
    .i9 {
      width: 270px; height: 235px;
      top: 5%; right: -35px;
      --rot: 8deg; --delay: 1.7s; --bob: 4.6s; --bob-start: 2.7s; --bob-height: -13px;
    }

    /* Lower-left — pizza/food accent */
    .i10 {
      width: 155px; height: 145px;
      bottom: 18%; left: 20%;
      --rot: -6deg; --delay: 1.9s; --bob: 5.2s; --bob-start: 2.9s; --bob-height: -10px;
    }

    /* Lower-right — pizza on board */
    .i11 {
      width: 155px; height: 145px;
      bottom: 18%; right: 20%;
      --rot: 6deg; --delay: 2.1s; --bob: 4.3s; --bob-start: 3.1s; --bob-height: -10px;
    }


    /* ─── HERO TEXT ─────────────────────────────────── */
    .hero-text {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    @keyframes textFadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      animation: textFadeUp 0.7s ease 2s both;
    }

    .hero-h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      color: var(--charcoal);
      line-height: 1.1;
      margin-bottom: 16px;
      animation: textFadeUp 0.7s ease 2.2s both;
    }
    .hero-h1 em { color: var(--wine); font-style: italic; }

    .hero-sub {
      font-size: 1.05rem;
      color: rgba(30,18,18,0.62);
      max-width: 480px;
      line-height: 1.7;
      margin: 0 auto 28px;
      animation: textFadeUp 0.7s ease 2.4s both;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      animation: textFadeUp 0.7s ease 2.6s both;
    }
    .btn-primary {
      background: var(--wine); color: white;
      padding: 14px 32px; border-radius: 8px;
      font-weight: 600; font-size: 0.95rem; text-decoration: none;
    }
    .btn-secondary {
      background: transparent; color: var(--charcoal);
      padding: 14px 32px; border-radius: 8px;
      font-weight: 600; font-size: 0.95rem; text-decoration: none;
      border: 2px solid rgba(30,18,18,0.28);
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand">
      St. James Winery
      <span>Branson, Missouri</span>
    </div>
    <a href="#" class="nav-cta">View Menu</a>
  </nav>

  <section class="hero">

    <div class="floaters">
      <!-- Far-left bleed -->
      <div class="item i1"><img src="Wine%20tasting.avif"      alt="Wine tasting" /></div>
      <!-- Left cluster -->
      <div class="item i2"><img src="paint%20and%20sip.avif"   alt="Paint and Sip" /></div>
      <div class="item i3"><img src="crafts%20beer.jpg"        alt="Craft beers" /></div>
      <div class="item i4"><img src="signature%20drinks.avif"  alt="Signature drinks" /></div>
      <!-- CENTER hero item — cutout food platter PNG -->
      <div class="item i5 cutout"><img src="ABH07090-removebg-preview.png"        alt="Bistro food platter" /></div>
      <!-- Right cluster -->
      <div class="item i6"><img src="dining.jpg"                                  alt="Dining" /></div>
      <!-- Wine can cutout — right accent -->
      <div class="item i7 cutout"><img src="St._James-20-removebg-preview.png"    alt="St. James peach wine can" /></div>
      <div class="item i8"><img src="ABH01915.jpg"                                alt="St. James experience" /></div>
      <!-- Far-right bleed — exterior cutout -->
      <div class="item i9 cutout"><img src="SJW_exterior_2__1_-removebg-preview.png" alt="St. James exterior" /></div>
      <!-- Lower accent items — pizza cutout -->
      <div class="item i10 cutout"><img src="pizza-removebg.png"                  alt="Wood-fired pizza" /></div>
      <div class="item i11"><img src="ABH02208.jpg"                               alt="Pizza on board" /></div>
    </div>

    <div class="hero-text">
      <p class="hero-label">Award-Winning Missouri Wines</p>
      <h1 class="hero-h1"><em>Wines &amp; Bistro Dining</em><br>in the Heart of Branson</h1>
      <p class="hero-sub">Wine tastings, brick-oven pizza, craft cocktails, and seasonal outdoor dining, all just off the Branson Strip.</p>
      <div class="hero-btns">
        <a href="tel:+14175448283" class="btn-primary">Call Us</a>
        <a href="https://www.stjamesbranson.com/menu" target="_blank" class="btn-secondary">View Menu</a>
      </div>
    </div>

  </section>

</body>
</html>
